            \ | 是否包含注意事项？ | 至少1项注意事项     |\n| S7 | 全身疾病控制要求         | 提及血糖/血压控制  \
            \    |\n| ID | 评估要点             | 指南核心要求         |\n| :- | :---------------\
            \ | :------------- |\n| C1 | 重度NPDR/高危PDR患者          | 需PRP          \
            \ |\n| C5 | DME或新生血管          | 抗VEGF          |\n| C6 | 玻璃体积血/牵拉性脱离 \
            \ | PPV手术          |\n\n\n#### 三、光凝手术专项评估\n\n| ID | 参数项    | 指南标准范围  \
            \   |\n| :- | :----- | :----------------------------- |\n| P1 | 手术类型明确\
