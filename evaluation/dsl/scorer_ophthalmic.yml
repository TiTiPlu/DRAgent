            \    \n    #### 一、规范性问题（存在性评估）\n\n| ID | 评估要点      | 评分依据   |\n| :- |\
            \ :-------- | :----------- |\n| S1 | 是否包含疾病诊断？ | 简要说明诊断、分期和病史 |\n| S2\
